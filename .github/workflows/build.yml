name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Backend Dependencies
      run: |
        cd Backend
        pip install fastapi uvicorn sqlalchemy psycopg2-binary python-jose[cryptography]

    - name: Test Backend
      run: |
        cd Backend
        python -m pytest || echo "No tests yet - skipping"

    - name: Unity Build Note
      run: echo "Unity project ready for manual build"
